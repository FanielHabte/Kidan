<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Datasets</title>
        <link rel="stylesheet" href="/style/fragments/navigation.css">
        <link rel="stylesheet" href="/style/guardian/datasets.css">
<!--        <link rel="stylesheet" href="../../static/style/fragments/navigation.css">-->
<!--        <link rel="stylesheet" href="../../static/style/guardian/datasets.css">-->
    </head>

    <div class="dataset-page-container">
            <div th:replace="~{fragments/navigation::header-nav-bar}"> </div>
<!--        <object type="text/html" data="../fragments/navigation.html"> </object>-->
        <div class="datasets-container">
            <div class="datasets-header">
                <h1> Datasets </h1>
                <form>
                    <button> New dataset </button>
                </form>
            </div>
            <form class="dataset-filter">
                <button> All types </button>
            </form>
            <table>
                <tr>
                    <th>Name</th> <th>Type</th> <th>Health</th> <th>Submissions</th> <th>Last activity</th>
                </tr>
                <tr th:each = "dataset : ${datasetList}">
                    <td th:text = "${dataset.name}"></td>
                    <td th:text = "${dataset.fileType}"></td>
                    <td th:text = "${dataset.isActive}"></td>
                    <td th:text = "${dataset.updatedAt}"></td>
                </tr>
            </table>
        </div>
    </div>
</html>
